<!DOCTYPE html>
<html>
<head>
    <title>Combinador de ZIP + PDFs con Vercel Blob</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; margin: 2rem; }
        .container { max-width: 800px; margin: auto; }
        .error { color: red; }
        .success { color: green; }
        button { padding: 0.5rem 1rem; }
        .file-input { margin: 1rem 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Combinar ZIP y/o PDFs en un solo PDF</h1>
    <p>Los archivos se suben directamente a Vercel Blob (máx. 50 MB por archivo).</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    
    <form id="uploadForm">
        {% csrf_token %}
        <div class="file-input">
            <label>Archivo ZIP (opcional):</label><br>
            <input type="file" id="zipFile" accept=".zip">
        </div>
        <div class="file-input">
            <label>Archivos PDF (opcional, múltiple):</label><br>
            <input type="file" id="pdfFiles" accept=".pdf" multiple>
        </div>
        <button type="button" id="submitBtn">Combinar y descargar</button>
    </form>
    <div id="progress"></div>
</div>

<script>
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';

    async function getUploadUrl(filename) {
        const res = await fetch('/get-upload-url/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify({ filename })
        });
        if (!res.ok) throw new Error(`No se pudo obtener URL de subida: ${res.statusText}`);
        const data = await res.json();
        return data.url;
    }

    async function subirABlob(file) {
        const uploadUrl = await getUploadUrl(file.name);
        const response = await fetch(uploadUrl, {
            method: 'PUT',
            headers: { 'Content-Type': file.type },
            body: file
        });
        if (!response.ok) throw new Error(`Fallo subida de ${file.name}: ${response.statusText}`);
        // La URL pública es la misma que la de subida (Vercel Blob)
        return uploadUrl;
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const zipFile = document.getElementById('zipFile').files[0];
        const pdfFiles = document.getElementById('pdfFiles').files;
        const progressDiv = document.getElementById('progress');
        
        progressDiv.innerHTML = '<p>Subiendo archivos a almacenamiento...</p>';
        let zipUrl = null;
        let pdfUrls = [];
        
        try {
            if (zipFile) zipUrl = await subirABlob(zipFile);
            for (let i = 0; i < pdfFiles.length; i++) {
                const url = await subirABlob(pdfFiles[i]);
                pdfUrls.push(url);
            }
            
            progressDiv.innerHTML = '<p>Procesando combinación...</p>';
            const formData = new FormData();
            formData.append('zip_url', zipUrl || '');
            pdfUrls.forEach(url => formData.append('pdf_urls', url));
            formData.append('csrfmiddlewaretoken', csrfToken);
            
            const response = await fetch('', { method: 'POST', body: formData });
            if (response.ok) {
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'combinado.pdf';
                link.click();
                URL.revokeObjectURL(link.href);
                progressDiv.innerHTML = '<p class="success">¡PDF generado!</p>';
            } else {
                const errorText = await response.text();
                progressDiv.innerHTML = `<p class="error">Error: ${errorText}</p>`;
            }
        } catch (err) {
            progressDiv.innerHTML = `<p class="error">Error: ${err.message}</p>`;
        }
    });
</script>
</body>
</html>
